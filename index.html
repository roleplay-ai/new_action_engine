
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Nudgeable Action Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
        background-color: #f8fafc;
        color: #0f172a;
        overflow-x: hidden;
        -webkit-tap-highlight-color: transparent;
        line-height: 1.5;
        background-image: 
          radial-gradient(at 0% 0%, hsla(210,100%,98%,1) 0, transparent 50%),
          radial-gradient(at 100% 0%, hsla(210,100%,96%,1) 0, transparent 50%),
          radial-gradient(at 50% 100%, hsla(210,100%,94%,1) 0, transparent 50%);
        min-height: 100vh;
      }
      
      body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        pointer-events: none;
        opacity: 0.02;
        z-index: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }

      h1, h2, h3, h4, .heading-font {
        letter-spacing: -0.01em;
      }

      .card-premium {
        background: #ffffff;
        border: 2px solid #000000;
        transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }

      .glass-nav {
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-bottom: 2px solid #000000;
      }

      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      * {
        transition-property: background-color, border-color, color, fill, stroke, opacity, box-shadow, transform, filter;
        transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
        transition-duration: 200ms;
      }

      .ambient-blob {
        position: fixed;
        width: 600px;
        height: 600px;
        border-radius: 50%;
        filter: blur(120px);
        z-index: -1;
        opacity: 0.1;
        pointer-events: none;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "recharts": "https://esm.sh/recharts@^3.7.0",
    "next": "https://esm.sh/next@^16.1.6"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div class="ambient-blob bg-blue-400 top-[-10%] left-[-10%]"></div>
    <div class="ambient-blob bg-yellow-400 bottom-[-10%] right-[-10%]"></div>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
